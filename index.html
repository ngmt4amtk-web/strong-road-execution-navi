<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0f1715">
    <title>最強への道</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app" id="app">

      <!-- HOME -->
      <section class="view view--home active" data-view="home">
        <header class="hero">
          <p class="hero__eyebrow">最強への道</p>
          <h1 class="hero__title">今日の3部</h1>
          <p class="hero__motto">★必須だけで最低ライン。残りは余裕で。</p>
        </header>

        <div class="cond-row" id="condRow" role="group" aria-label="今日の身体">
          <button class="cond" data-cond="normal" type="button">普通</button>
          <button class="cond" data-cond="recover" type="button">回復寄り</button>
          <button class="cond" data-cond="migraine" type="button">前兆あり</button>
        </div>

        <div class="three-cta">
          <button class="big-cta" data-go-session="morning" type="button">
            <span class="big-cta__corner">朝</span>
            <span class="big-cta__main">朝トレ</span>
            <span class="big-cta__sub" id="morningSub">必須3分・全部約8分</span>
          </button>
          <button class="big-cta" data-go-session="main" type="button">
            <span class="big-cta__corner">修</span>
            <span class="big-cta__main">修行</span>
            <span class="big-cta__sub" id="mainSub">必須20分・全部約60分</span>
          </button>
          <button class="big-cta" data-go-session="bedtime" type="button">
            <span class="big-cta__corner">夜</span>
            <span class="big-cta__main">寝る前</span>
            <span class="big-cta__sub" id="bedtimeSub">必須4分・全部約10分</span>
          </button>
        </div>

        <div class="home-grid">
          <button class="tile" data-go="oshikura" type="button">
            <span class="tile__icon">◯</span>
            <span class="tile__label">押し蔵くん（部位別）</span>
          </button>
          <button class="tile" data-go="week" type="button">
            <span class="tile__icon">12</span>
            <span class="tile__label">12週プラン（参考）</span>
          </button>
        </div>

        <details class="note-collapse">
          <summary>今日の3行記録</summary>
          <div class="note-body">
            <label>代表場面<input id="noteScene" type="text" placeholder="1つだけ"></label>
            <label>原因
              <select id="noteCause">
                <option value="">選ぶ</option>
                <option>距離</option><option>視線</option><option>足</option><option>呼吸</option><option>力み</option>
              </select>
            </label>
            <label>次回試すこと<input id="noteNext" type="text" placeholder="1つだけ"></label>
          </div>
        </details>

        <p class="footer-mini">出力・反応・回復・継続を同時に残す。やりすぎは最強から遠い。</p>
      </section>

      <!-- RUN -->
      <section class="view view--run" data-view="run">
        <header class="bar bar--run">
          <button class="bar__back" data-go="home" type="button">×</button>
          <div class="bar__center">
            <span class="bar__sub" id="runSessionTitle">朝トレ</span>
            <span class="bar__count" id="runStepCount">1 / 8</span>
          </div>
          <div class="bar__spacer"></div>
        </header>

        <div class="progress-track"><span class="progress-bar" id="runProgress"></span></div>

        <main class="run-body">
          <div class="run-tag-row" id="runTagRow"></div>
          <img class="run-image" id="runImage" alt="" src="assets/morning-clear.png">
          <h2 class="run-title" id="runTitle">背骨はまっすぐ</h2>
          <p class="run-instruction" id="runInstruction">立位で足裏全体を床に置く。</p>

          <div class="timer">
            <output class="timer__display" id="timerOutput">00:40</output>
            <button class="timer__button" id="timerButton" type="button">タイマー開始</button>
          </div>

          <details class="run-details">
            <summary>動き方の詳細</summary>
            <div class="run-details__body" id="runDetails"></div>
          </details>
        </main>

        <footer class="run-foot">
          <button class="foot-btn foot-btn--ghost" id="prevButton" type="button">戻る</button>
          <button class="foot-btn foot-btn--skip" id="skipButton" type="button">飛ばす</button>
          <button class="foot-btn foot-btn--primary" id="nextButton" type="button">できた</button>
        </footer>
      </section>

      <!-- DONE -->
      <section class="view view--done" data-view="done">
        <div class="done-wrap">
          <p class="done-eyebrow">完了</p>
          <h2 class="done-title" id="doneSessionTitle">朝トレ</h2>
          <p class="done-text" id="doneText">必須◯個・任意◯個できた。今日の刺激は十分。</p>
          <p class="done-quote">最強は翌日も戻れる強さ。</p>
          <button class="cta" data-go="home" type="button">
            <span class="cta__main">ホームへ</span>
          </button>
        </div>
      </section>

      <!-- OSHIKURA -->
      <section class="view" data-view="oshikura">
        <header class="bar">
          <button class="bar__back" data-go="home" type="button">←</button>
          <h2 class="bar__title">押し蔵くん</h2>
        </header>
        <p class="lead">主役ではなく、戻すための補助。強く押すほど効くではない。</p>

        <div class="tab-row" id="oshikuraTabs">
          <button class="tab" data-osh="neck" type="button">首肩</button>
          <button class="tab" data-osh="forearm" type="button">前腕・手</button>
          <button class="tab" data-osh="foot" type="button">足裏</button>
          <button class="tab" data-osh="headache" type="button">片頭痛</button>
          <button class="tab" data-osh="lesson" type="button">レッスン間</button>
        </div>
        <div class="oshikura-body" id="oshikuraBody"></div>
      </section>

      <!-- WEEK -->
      <section class="view" data-view="week">
        <header class="bar">
          <button class="bar__back" data-go="home" type="button">←</button>
          <h2 class="bar__title">12週プラン</h2>
        </header>
        <p class="lead">毎週1個ずつだけ追加。デロード週は60-70%。参考用。</p>
        <div class="week-list" id="weekList"></div>
        <details class="note-collapse">
          <summary>レッスン間1分キュー（10種）</summary>
          <div class="cue-list" id="cueList"></div>
        </details>
      </section>

    </div>
    <script src="app.js"></script>
  </body>
</html>
